<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>

    <style>
        .container{
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
        }

        .box{
            background-color: gray;
            color: white;
            text-align: center;
            padding: 30px;
            font-size: 20px;
        }
    </style>

</head>
<body>

    <div class="container">

        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>

        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>

    </div>

</body>
</html>
