<!DOCTYPE html>
<html>
<head>
    <title>Transform Effect</title>

    <style>
        .box{
            width:150px;
            height:150px;
            background-color:gray;
            color:white;
            text-align:center;
            line-height:150px;
            margin:100px auto;

            /* smooth effect */
            transition:1s;
        }

        /* Mouse le jane par effect */
        .box:hover{
            transform: scale(1.1) rotate(10deg);
        }
    </style>

</head>
<body>

    <div class="box">
        Hover Me
    </div>

</body>
</html>
